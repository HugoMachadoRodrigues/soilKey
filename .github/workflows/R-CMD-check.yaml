# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Runs `R CMD check` against the soilKey package on three platforms / two
# R versions, exercising both the deterministic-key core (no Suggests) and
# the full Suggests stack (terra, prospectr, ellmer mocks, aqp, ...).
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: R-CMD-check

jobs:
  R-CMD-check:
    runs-on: ${{ matrix.config.os }}

    name: ${{ matrix.config.os }} (${{ matrix.config.r }})

    strategy:
      fail-fast: false
      matrix:
        config:
          - {os: macos-latest,   r: 'release'}
          - {os: windows-latest, r: 'release'}
          - {os: ubuntu-latest,  r: 'devel',   http-user-agent: 'release'}
          - {os: ubuntu-latest,  r: 'release'}
          - {os: ubuntu-latest,  r: 'oldrel-1'}

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      R_KEEP_PKG_SOURCE: yes
      # Skip benchmark + heavy network-dependent tests on CI.
      SOILKEY_SKIP_NETWORK: "true"
      SOILKEY_SKIP_BENCHMARK: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: ${{ matrix.config.r }}
          http-user-agent: ${{ matrix.config.http-user-agent }}
          use-public-rspm: true

      - name: Set PROJ_LIB / GDAL_DATA (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          # Set PROJ_LIB / GDAL_DATA only if the system dirs exist, so
          # terra::rast(crs = "EPSG:4326") finds proj.db. Eliminates the
          # "PROJ: proj_create: no database context" NOTE on as-cran.
          for d in /usr/share/proj /usr/lib/x86_64-linux-gnu/proj; do
            if [ -d "$d" ]; then echo "PROJ_LIB=$d" >> "$GITHUB_ENV"; break; fi
          done
          for d in /usr/share/gdal /usr/lib/gdal; do
            if [ -d "$d" ]; then echo "GDAL_DATA=$d" >> "$GITHUB_ENV"; break; fi
          done

      - name: Set PROJ_LIB / GDAL_DATA (macOS Homebrew)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          if [ -d /opt/homebrew/share/proj ]; then
            echo "PROJ_LIB=/opt/homebrew/share/proj" >> "$GITHUB_ENV"
          elif [ -d /usr/local/share/proj ]; then
            echo "PROJ_LIB=/usr/local/share/proj" >> "$GITHUB_ENV"
          fi
          if [ -d /opt/homebrew/share/gdal ]; then
            echo "GDAL_DATA=/opt/homebrew/share/gdal" >> "$GITHUB_ENV"
          elif [ -d /usr/local/share/gdal ]; then
            echo "GDAL_DATA=/usr/local/share/gdal" >> "$GITHUB_ENV"
          fi

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::rcmdcheck
          needs: check

      - uses: r-lib/actions/check-r-package@v2
        with:
          upload-snapshots: true
          build_args: 'c("--no-manual","--compact-vignettes=gs+qpdf")'
