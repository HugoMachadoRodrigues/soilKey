name: docker-build-and-push

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Override image tag (default: derived from latest VCS tag)"
        required: false

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve image tag
        id: meta
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "image_tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            # Strip the leading "v" from refs/tags/v0.9.51 -> 0.9.51
            tag="${GITHUB_REF_NAME#v}"
            echo "image_tag=${tag}" >> "$GITHUB_OUTPUT"
          else
            echo "image_tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.image_tag }}
            ghcr.io/${{ github.repository }}:latest
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke-test the freshly pushed image
        run: |
          docker run --rm \
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.image_tag }} \
            R --vanilla -e \
            'stopifnot(requireNamespace("soilKey"));
             cat("soilKey ", as.character(packageVersion("soilKey")), " loaded inside the published image\n", sep = "")'
