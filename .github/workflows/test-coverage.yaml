# Workflow derived from https://github.com/r-lib/actions/tree/v2/examples
# Reports test coverage to Codecov on every push/PR to main.
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

name: test-coverage

jobs:
  test-coverage:
    runs-on: ubuntu-latest
    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      SOILKEY_SKIP_NETWORK: "true"
      SOILKEY_SKIP_BENCHMARK: "true"

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Set PROJ_LIB / GDAL_DATA
        shell: bash
        run: |
          for d in /usr/share/proj /usr/lib/x86_64-linux-gnu/proj; do
            if [ -d "$d" ]; then echo "PROJ_LIB=$d" >> "$GITHUB_ENV"; break; fi
          done
          for d in /usr/share/gdal /usr/lib/gdal; do
            if [ -d "$d" ]; then echo "GDAL_DATA=$d" >> "$GITHUB_ENV"; break; fi
          done

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          extra-packages: any::covr, any::xml2
          needs: coverage

      - name: Test coverage
        run: |
          cov <- covr::package_coverage(
            quiet = FALSE,
            clean = FALSE,
            install_path = file.path(normalizePath(Sys.getenv("RUNNER_TEMP"), winslash = "/"), "package")
          )
          covr::to_cobertura(cov)
        shell: Rscript {0}

      - uses: codecov/codecov-action@v4
        with:
          # Don't fail CI when Codecov rejects the upload -- this is
          # tolerable: coverage is for the badge, not a hard gate.
          # Codecov requires CODECOV_TOKEN as a repo secret to accept
          # uploads on protected branches; until that is set, the
          # action errors out and CI would otherwise go red. Set the
          # token under Settings -> Secrets and variables -> Actions
          # to enable real uploads.
          fail_ci_if_error: false
          files: ./cobertura.xml
          plugins: noop
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Show testthat output
        if: always()
        run: |
          ## --------------------------------------------------------------------
          find '${{ runner.temp }}/package' -name 'testthat.Rout*' -exec cat '{}' \; || true
        shell: bash

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-test-failures
          path: ${{ runner.temp }}/package
