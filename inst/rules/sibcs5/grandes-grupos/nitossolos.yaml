# =============================================================
# SiBCS 5a edicao -- Nitossolos (Cap 13, pp 234-236)
#
# Grandes grupos -- 14 classes em 3 subordens:
#   NB Brunos:    4 GGs (Aluminoferrico/Aluminico/Distroferrico/Distrofico)
#   NV Vermelhos: 6 GGs (TaAl/Al/Distroferrico/Distrofico/Eutroferrico/Eutrofico)
#   NX Haplicos:  4 GGs (TaAl/Al/Distrofico/Eutrofico)
#
# Note: Cap 13 NB usa Fe2O3 150-360 g/kg (15-36%). Aproximamos com
# carater_ferrico (18-36%) -- pequena divergencia, pode ser refinada
# em release futura com parametro min_fe2o3_pct=15.
# =============================================================

grandes_grupos:

  "NB":
    - code: "NBaf"
      name: "Nitossolos Brunos Aluminoférricos"
      tests:
        all_of:
          - carater_alitico: {}
          - carater_ferrico: {}
    - code: "NBal"
      name: "Nitossolos Brunos Alumínicos"
      tests:
        all_of:
          - carater_alitico: {}
    - code: "NBdf"
      name: "Nitossolos Brunos Distroférricos"
      tests:
        all_of:
          - distrofico: {}
          - carater_ferrico: {}
    - code: "NBd"
      name: "Nitossolos Brunos Distróficos"
      tests:
        all_of:
          - distrofico: {}

  "NV":
    - code: "NVtal"
      name: "Nitossolos Vermelhos Ta Alumínicos"
      tests:
        all_of:
          - atividade_argila_alta: {}
          - carater_alitico: {}
    - code: "NVal"
      name: "Nitossolos Vermelhos Alumínicos"
      tests:
        all_of:
          - carater_alitico: {}
    - code: "NVdf"
      name: "Nitossolos Vermelhos Distroférricos"
      tests:
        all_of:
          - distrofico: {}
          - carater_ferrico: {}
    - code: "NVd"
      name: "Nitossolos Vermelhos Distróficos"
      tests:
        all_of:
          - distrofico: {}
    - code: "NVef"
      name: "Nitossolos Vermelhos Eutroférricos"
      tests:
        all_of:
          - eutrofico: {}
          - carater_ferrico: {}
    - code: "NVe"
      name: "Nitossolos Vermelhos Eutróficos"
      tests:
        all_of:
          - eutrofico: {}

  "NX":
    - code: "NXtal"
      name: "Nitossolos Háplicos Ta Alumínicos"
      tests:
        all_of:
          - atividade_argila_alta: {}
          - carater_alitico: {}
    - code: "NXal"
      name: "Nitossolos Háplicos Alumínicos"
      tests:
        all_of:
          - carater_alitico: {}
    - code: "NXd"
      name: "Nitossolos Háplicos Distróficos"
      tests:
        all_of:
          - distrofico: {}
    - code: "NXe"
      name: "Nitossolos Háplicos Eutróficos"
      tests:
        all_of:
          - eutrofico: {}
