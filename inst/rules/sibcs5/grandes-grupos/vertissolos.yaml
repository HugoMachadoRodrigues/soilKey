# =============================================================
# SiBCS 5a edicao -- Vertissolos (Cap 17, pp 273-280)
#
# Grandes grupos -- 11 classes em 3 subordens:
#   VG Hidromorficos: 4 GGs (Carbonaticos / Sodicos / Salicos / Orticos)
#   VE Ebanicos:      3 GGs (Carbonaticos / Sodicos / Orticos)
#   VX Haplicos:      4 GGs (Carbonaticos / Sodicos / Salicos / Orticos)
# =============================================================

grandes_grupos:

  # -- VG Hidromorficos -----
  "VG":
    - code: "VGca"
      name: "Vertissolos Hidromórficos Carbonáticos"
      tests:
        all_of:
          - carater_carbonatico: { max_depth_cm: 100 }
    - code: "VGsd"
      name: "Vertissolos Hidromórficos Sódicos"
      tests:
        all_of:
          - carater_sodico: { max_depth_cm: 100 }
    - code: "VGsl"
      name: "Vertissolos Hidromórficos Sálicos"
      tests:
        all_of:
          - carater_salico: { max_depth_cm: 100 }
    - code: "VGo"
      name: "Vertissolos Hidromórficos Órticos"
      tests:
        default: true

  # -- VE Ebanicos -----
  "VE":
    - code: "VEca"
      name: "Vertissolos Ebânicos Carbonáticos"
      tests:
        all_of:
          - carater_carbonatico: { max_depth_cm: 100 }
    - code: "VEsd"
      name: "Vertissolos Ebânicos Sódicos"
      tests:
        all_of:
          - carater_sodico: { max_depth_cm: 100 }
    - code: "VEo"
      name: "Vertissolos Ebânicos Órticos"
      tests:
        default: true

  # -- VX Haplicos -----
  "VX":
    - code: "VXca"
      name: "Vertissolos Háplicos Carbonáticos"
      tests:
        all_of:
          - carater_carbonatico: { max_depth_cm: 100 }
    - code: "VXsd"
      name: "Vertissolos Háplicos Sódicos"
      tests:
        all_of:
          - carater_sodico: { max_depth_cm: 100 }
    - code: "VXsl"
      name: "Vertissolos Háplicos Sálicos"
      tests:
        all_of:
          - carater_salico: { max_depth_cm: 100 }
    - code: "VXo"
      name: "Vertissolos Háplicos Órticos"
      tests:
        default: true
