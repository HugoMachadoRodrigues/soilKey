# =============================================================
# SiBCS 5a edicao -- Chernossolos (Cap 7, pp 158-159)
#
# Grandes grupos (3o nivel categorico) -- 11 classes em 4 subordens:
#
#   MD Rendzicos:   3 GGs (Petrocalcicos / Liticos / Orticos)
#   ME Ebanicos:    2 GGs (Carbonaticos / Orticos)
#   MT Argiluvicos: 3 GGs (Ferricos / Carbonaticos / Orticos)
#   MX Haplicos:    3 GGs (Ferricos / Carbonaticos / Orticos)
#
# Cap 7 NAO requer novos diagnosticos -- reusa massivamente os
# atributos ja implementados (horizonte_petrocalcico, contato_litico,
# carater_carbonatico, carater_ferrico, carater_perferrico).
#
# "Ferricos" no Cap 7 = Fe2O3 >= 18% (sem upper bound = 36%);
# combinamos carater_ferrico OR carater_perferrico via any_of.
#
# Codigos: 3-4 chars (subordem 2 + suffix).
# =============================================================

grandes_grupos:

  # ============================================================
  # MD -- Chernossolos Rendzicos (Cap 7, p 158) -- 3 GGs
  # ============================================================
  "MD":
    - code: "MDpc"
      name: "Chernossolos Rêndzicos Petrocálcicos"
      tests:
        all_of:
          - horizonte_petrocalcico: {}
    - code: "MDli"
      name: "Chernossolos Rêndzicos Líticos"
      tests:
        any_of:
          - contato_litico: { max_depth_cm: 50 }
          - contato_litico_fragmentario: { max_depth_cm: 50 }
    - code: "MDo"
      name: "Chernossolos Rêndzicos Órticos"
      tests:
        default: true

  # ============================================================
  # ME -- Chernossolos Ebanicos (Cap 7, p 158) -- 2 GGs
  # ============================================================
  "ME":
    - code: "MEca"
      name: "Chernossolos Ebânicos Carbonáticos"
      tests:
        all_of:
          - carater_carbonatico: { max_depth_cm: 150 }
    - code: "MEo"
      name: "Chernossolos Ebânicos Órticos"
      tests:
        default: true

  # ============================================================
  # MT -- Chernossolos Argiluvicos (Cap 7, pp 158-159) -- 3 GGs
  # ============================================================
  "MT":
    - code: "MTfe"
      name: "Chernossolos Argilúvicos Férricos"
      tests:
        any_of:
          - carater_ferrico: {}
          - carater_perferrico: {}
    - code: "MTca"
      name: "Chernossolos Argilúvicos Carbonáticos"
      tests:
        all_of:
          - carater_carbonatico: { max_depth_cm: 150 }
    - code: "MTo"
      name: "Chernossolos Argilúvicos Órticos"
      tests:
        default: true

  # ============================================================
  # MX -- Chernossolos Haplicos (Cap 7, p 159) -- 3 GGs
  # ============================================================
  "MX":
    - code: "MXfe"
      name: "Chernossolos Háplicos Férricos"
      tests:
        any_of:
          - carater_ferrico: {}
          - carater_perferrico: {}
    - code: "MXca"
      name: "Chernossolos Háplicos Carbonáticos"
      tests:
        all_of:
          - carater_carbonatico: { max_depth_cm: 150 }
    - code: "MXo"
      name: "Chernossolos Háplicos Órticos"
      tests:
        default: true
