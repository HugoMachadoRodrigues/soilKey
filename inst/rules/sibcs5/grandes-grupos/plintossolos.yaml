# =============================================================
# SiBCS 5a edicao -- Plintossolos (Cap 16, pp 261-272)
#
# Grandes grupos -- 9 classes em 3 subordens:
#   FF Petricos:    2 GGs (Litoplinticos / Concrecionarios)
#   FT Argiluvicos: 3 GGs (Aluminicos / Distroficos / Eutroficos)
#   FX Haplicos:    4 GGs (Acricos / Aluminicos / Distroficos / Eutroficos)
# =============================================================

grandes_grupos:

  # -- FF Petricos -----
  "FF":
    - code: "FFlp"
      name: "Plintossolos Pétricos Litoplínticos"
      tests:
        all_of:
          - horizonte_litoplintico: {}
    - code: "FFco"
      name: "Plintossolos Pétricos Concrecionários"
      tests:
        default: true

  # -- FT Argiluvicos -----
  "FT":
    - code: "FTal"
      name: "Plintossolos Argilúvicos Alumínicos"
      tests:
        all_of:
          - carater_alitico: {}
    - code: "FTd"
      name: "Plintossolos Argilúvicos Distróficos"
      tests:
        all_of:
          - distrofico: {}
    - code: "FTe"
      name: "Plintossolos Argilúvicos Eutróficos"
      tests:
        default: true

  # -- FX Haplicos -----
  "FX":
    - code: "FXac"
      name: "Plintossolos Háplicos Ácricos"
      tests:
        all_of:
          - carater_acrico: {}
    - code: "FXal"
      name: "Plintossolos Háplicos Alumínicos"
      tests:
        all_of:
          - carater_alitico: {}
    - code: "FXd"
      name: "Plintossolos Háplicos Distróficos"
      tests:
        all_of:
          - distrofico: {}
    - code: "FXe"
      name: "Plintossolos Háplicos Eutróficos"
      tests:
        default: true
