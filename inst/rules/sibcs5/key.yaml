    - { code: "RR",   name: "Neossolos Regoliticos",    test: neossolo_regolitico }

  "N":   # Nitossolos (Cap 13)
    - { code: "NB",   name: "Nitossolos Brunos",    test: nitossolo_bruno }
    - { code: "NV",   name: "Nitossolos Vermelhos", test: nitossolo_vermelho }
