version: "SiBCS 5a edicao (Embrapa, 2018)"
implementation_status: "soilKey v0.7 -- 13/13 ordens wired (Cap 4 chave canonica)"
source: |
  Empresa Brasileira de Pesquisa Agropecuaria (Embrapa). Embrapa Solos.
  Sistema Brasileiro de Classificacao de Solos. 5a ed. rev. e ampl.
  Brasilia, DF: Embrapa, 2018, 356 p. ISBN 978-85-7035-800-4.

# CHAVE CANONICA DO 1o NIVEL (Cap 4, pp 110-114).
#
# A chave do SiBCS 5a ed. nao segue ordem alfabetica -- ela testa
# primeiro as ordens com sinais mais distintivos:
#   1. Organossolos (O)  -- horizonte histico dominante
#   2. Neossolos    (R)  -- sem horizonte B diagnostico
#   3. Vertissolos  (V)  -- horizonte vertico dentro 100 cm
#   4. Espodossolos (E)  -- B espodico
#   5. Planossolos  (S)  -- B planico (sem coincidencia plintico)
#   6. Gleissolos   (G)  -- horizonte glei
#   7. Latossolos   (L)  -- B latossolico
#   8. Chernossolos (M)  -- A chernozemico + alta sat / carbonatos
#   9. Cambissolos  (C)  -- B incipiente (sem plintossolo)
#  10. Plintossolos (F)  -- horizonte plintico
#  11. Luvissolos   (T)  -- B textural + Ta + V alta
#  12. Nitossolos   (N)  -- B nitico + clay >= 35%
#  13. Argissolos   (P)  -- B textural (catch-all)
#
# v0.7 wiring: cada ordem chama seu RSG-level diagnostic em
# R/diagnostics-rsg-sibcs.R, que aplica o gate canonico AND a exclusao
# das classes que vem antes na chave.

ordens:

  - code: "O"
    name: Organossolos
    tests:
      all_of:
        - organossolo: {}

  - code: "R"
    name: Neossolos
    tests:
      all_of:
        - neossolo: {}

  - code: "V"
    name: Vertissolos
    tests:
      all_of:
        - vertissolo: {}

  - code: "E"
    name: Espodossolos
    tests:
      all_of:
        - espodossolo: {}

  - code: "S"
    name: Planossolos
    tests:
      all_of:
        - planossolo: {}

  - code: "G"
    name: Gleissolos
    tests:
      all_of:
        - gleissolo: {}

  - code: "L"
    name: Latossolos
    tests:
      all_of:
        - latossolo: {}

  - code: "M"
    name: Chernossolos
    tests:
      all_of:
        - chernossolo: {}

  - code: "C"
    name: Cambissolos
    tests:
      all_of:
        - cambissolo: {}

  - code: "F"
    name: Plintossolos
    tests:
      all_of:
        - plintossolo: {}

  - code: "T"
    name: Luvissolos
    tests:
      all_of:
        - luvissolo: {}

  - code: "N"
    name: Nitossolos
    tests:
      all_of:
        - nitossolo: {}

  - code: "P"
    name: Argissolos
    tests:
      all_of:
        - argissolo: {}
    notes: "Catch-all final: B textural que nao se enquadra em Luvissolos / Nitossolos."

# =============================================================
# CHAVE DO 2o NIVEL (subordens) -- Caps 5-17
# =============================================================
#
# Para cada ordem, lista as subordens em ordem canonica do livro.
# A primeira subordem cujo diagnostico passa captura o perfil; a
# ultima de cada lista e o catch-all (Haplicos / Vermelho-Amarelos /
# Regoliticos / Ferri-humiluvicos).

subordens:

  "P":   # Argissolos (Cap 5)
    - { code: "PBAC", name: "Argissolos Bruno-Acinzentados", test: argissolo_bruno_acinzentado }
    - { code: "PAC",  name: "Argissolos Acinzentados",        test: argissolo_acinzentado }
    - { code: "PA",   name: "Argissolos Amarelos",            test: argissolo_amarelo }
    - { code: "PV",   name: "Argissolos Vermelhos",           test: argissolo_vermelho }
    - { code: "PVA",  name: "Argissolos Vermelho-Amarelos",   test: argissolo_vermelho_amarelo }

  "C":   # Cambissolos (Cap 6)
    - { code: "CH",   name: "Cambissolos Histicos",  test: cambissolo_histico }
    - { code: "CHU",  name: "Cambissolos Humicos",   test: cambissolo_humico }
    - { code: "CY",   name: "Cambissolos Fluvicos",  test: cambissolo_fluvico }
    - { code: "CX",   name: "Cambissolos Haplicos",  test: cambissolo_haplico }

  "M":   # Chernossolos (Cap 7)
    - { code: "MD",   name: "Chernossolos Rendzicos",   test: chernossolo_rendzico }
    - { code: "ME",   name: "Chernossolos Ebanicos",    test: chernossolo_ebanico }
    - { code: "MT",   name: "Chernossolos Argiluvicos", test: chernossolo_argiluvico }
    - { code: "MX",   name: "Chernossolos Haplicos",    test: chernossolo_haplico }

  "E":   # Espodossolos (Cap 8)
    - { code: "EK",   name: "Espodossolos Humiluvicos",       test: espodossolo_humiluvico }
    - { code: "EJ",   name: "Espodossolos Ferriluvicos",      test: espodossolo_ferriluvico }
    - { code: "ES",   name: "Espodossolos Ferri-humiluvicos", test: espodossolo_ferri_humiluvico }

  "G":   # Gleissolos (Cap 9)
    - { code: "GJ",   name: "Gleissolos Tiomorficos", test: gleissolo_tiomorfico }
    - { code: "GZ",   name: "Gleissolos Salicos",     test: gleissolo_salico }
    - { code: "GM",   name: "Gleissolos Melanicos",   test: gleissolo_melanico }
    - { code: "GX",   name: "Gleissolos Haplicos",    test: gleissolo_haplico }

  "L":   # Latossolos (Cap 10)
    - { code: "LB",   name: "Latossolos Brunos",            test: latossolo_bruno }
    - { code: "LA",   name: "Latossolos Amarelos",          test: latossolo_amarelo }
    - { code: "LV",   name: "Latossolos Vermelhos",         test: latossolo_vermelho }
    - { code: "LVA",  name: "Latossolos Vermelho-Amarelos", test: latossolo_vermelho_amarelo }

  "T":   # Luvissolos (Cap 11)
    - { code: "TC",   name: "Luvissolos Cromicos", test: luvissolo_cromico }
