# =============================================================
# SiBCS 5a edicao -- Nitossolos (Cap 13, pp 236-241)
#
# Subgrupos -- 43 classes em 14 GGs.
# Codigos suffix: RuHu=rubricos+humicos, Ru=rubricos, Hu=humicos,
# La=latossolicos, Lf=leptofragmentarios, Le=lepticos, Pl=plintossolicos,
# Ch=chernossolicos, Tp=tipicos.
# =============================================================

subgrupos:

  "NBaf":
    - code: "NBafRuHu"
      name: "Nitossolos Brunos Aluminoférricos rúbricos húmicos"
      tests:
        all_of:
          - carater_rubrico: {}
          - horizonte_A_humico: {}
    - code: "NBafRu"
      name: "Nitossolos Brunos Aluminoférricos rúbricos"
      tests:
        all_of:
          - carater_rubrico: {}
    - code: "NBafHu"
      name: "Nitossolos Brunos Aluminoférricos húmicos"
