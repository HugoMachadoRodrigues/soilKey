# =============================================================
# SiBCS 5a edicao -- Cambissolos (Cap 6, pp 143-156)
#
# Subgrupos (4o nivel categorico) -- 109 classes em 26 GGs:
#
#   CH  Histicos:   2 GGs com 4+4 = 8 SGs
#   CHU Humicos:    4 GGs com 5+4+4+5 = 18 SGs
#   CY  Fluvicos:   8 GGs com 4+3+2+2+2+5+2+2 = 22 SGs
#   CX  Haplicos:  12 GGs com 6+4+2+4+3+3+9+6+3+7+7+7 = 61 SGs
#
# Codigos suffix: Lf=leptofragmentario, Le=leptico, Sp=saprolitico,
# Ep=espodossolico, La=latossolico, Vs=vertissolico, Gl=gleissolico,
# Sa=salino, So=solodico, Sd=sodico, Ps=planossolico, Pp=petroplintico,
# Pl=plintossolico, Ar=argiluvico, Ch=chernossolico, Fr=fragmentario,
# Li=litico, HC=hipocarbonatico, Tp=tipico (catch-all).
# =============================================================

subgrupos:

  # ============================================================
  # CH -- Cambissolos Histicos (Cap 6, pp 143-144) -- 8 SGs
  # ============================================================

  # ----- 1.1 CH Aluminicos -- 4 subgrupos -----
  "CHal":
    - code: "CHalLf"
      name: "Cambissolos Hísticos Alumínicos leptofragmentários"
      tests:
        all_of:
          - carater_leptofragmentario: {}
    - code: "CHalLe"
      name: "Cambissolos Hísticos Alumínicos lépticos"
      tests:
        all_of:
          - carater_leptico: {}
    - code: "CHalEp"
      name: "Cambissolos Hísticos Alumínicos espodossólicos"
      tests:
        all_of:
          - carater_espodico: {}
    - code: "CHalTp"
      name: "Cambissolos Hísticos Alumínicos típicos"
      tests:
        default: true

  # ----- 1.2 CH Distroficos -- 4 subgrupos -----
