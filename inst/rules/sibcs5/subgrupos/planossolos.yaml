      name: "Planossolos Háplicos Alumínicos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "SXalEs"
      name: "Planossolos Háplicos Alumínicos espessos"
      tests:
        all_of:
          - subgrupo_planossolo_espessos: {}
    - code: "SXalMe"
      name: "Planossolos Háplicos Alumínicos mésicos"
      tests:
        all_of:
          - subgrupo_planossolo_mesicos: {}
    - code: "SXalGl"
      name: "Planossolos Háplicos Alumínicos gleissólicos"
      tests:
        all_of:
          - carater_gleissolico: { max_depth_cm: 100 }
    - code: "SXalTp"
      name: "Planossolos Háplicos Alumínicos típicos"
      tests:
