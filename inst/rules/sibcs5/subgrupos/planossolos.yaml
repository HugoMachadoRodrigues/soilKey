  "SXd":
    - code: "SXdSd"
      name: "Planossolos Háplicos Distróficos solódicos"
      tests:
        all_of:
          - carater_solodico: {}
    - code: "SXdEa"
      name: "Planossolos Háplicos Distróficos espessarênicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "SXdArGl"
      name: "Planossolos Háplicos Distróficos arênicos gleissólicos"
      tests:
        all_of:
          - carater_arenico: {}
