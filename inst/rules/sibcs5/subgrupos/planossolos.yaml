    - code: "SXdMe"
      name: "Planossolos Háplicos Distróficos mésicos"
      tests:
        all_of:
          - subgrupo_planossolo_mesicos: {}
    - code: "SXdGl"
      name: "Planossolos Háplicos Distróficos gleissólicos"
      tests:
        all_of:
          - carater_gleissolico: { max_depth_cm: 100 }
    - code: "SXdPl"
      name: "Planossolos Háplicos Distróficos plintossólicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "SXdTp"
      name: "Planossolos Háplicos Distróficos típicos"
