    - code: "SXeEa"
      name: "Planossolos Háplicos Eutróficos espessarênicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "SXeAr"
      name: "Planossolos Háplicos Eutróficos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "SXeEs"
      name: "Planossolos Háplicos Eutróficos espessos"
      tests:
        all_of:
          - subgrupo_planossolo_espessos: {}
    - code: "SXeMe"
      name: "Planossolos Háplicos Eutróficos mésicos"
      tests:
        all_of:
          - subgrupo_planossolo_mesicos: {}
    - code: "SXeVt"
      name: "Planossolos Háplicos Eutróficos vertissólicos"
      tests:
        all_of:
          - carater_vertissolico: {}
    - code: "SXeGl"
      name: "Planossolos Háplicos Eutróficos gleissólicos"
      tests:
        all_of:
          - carater_gleissolico: { max_depth_cm: 100 }
    - code: "SXeCh"
