# =============================================================
# SiBCS 5a edicao -- Argissolos (Cap 5, pp 119-138)
#
# Subgrupos (4o nivel categorico) -- ~165 classes em 23 GGs (5
# subordens). Wirados em 3 stages sequenciais:
#
#   v0.7.4.B.1 -- PBAC subgrupos (8 classes)        ESTE COMMIT
#   v0.7.4.B.2 -- PAC subgrupos  (21 classes)       proximo commit
#   v0.7.4.B.3 -- PVA subgrupos  (36 classes)
#   v0.7.4.C   -- PA + PV subgrupos (~100 classes)
#
# Codigos: 6-12 chars, sempre comecando com o GG code (PBACtal,
# PBACal, PBACd) + 2-4 char suffix em camelCase descritivo.
# Cada GG termina com sufixo "Tp" (catch-all 'tipicos').
# =============================================================

subgrupos:

  # ============================================================
  # v0.7.4.B.1 -- PBAC subgrupos (Cap 5, p 119)
  # ============================================================
  #
  # PBACtal: 4 SGs canonicos (Ta_Al com espesso-humico tipico do RS)
  # PBACal:  2 SGs (abrupticos / tipicos)
  # PBACd:   2 SGs (abrupticos / tipicos)

  # ----- 1.1 PBAC Ta Aluminicos -- 4 subgrupos -----
  "PBACtal":
    - code: "PBACtalAb"
      name: "Argissolos Bruno-Acinzentados Ta Aluminicos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PBACtalEh"
      name: "Argissolos Bruno-Acinzentados Ta Aluminicos espesso-humicos"
      tests:
        all_of:
          - carater_humico_espesso: {}
    - code: "PBACtalHu"
      name: "Argissolos Bruno-Acinzentados Ta Aluminicos humicos"
      tests:
        all_of:
          - horizonte_A_humico: {}
    - code: "PBACtalTp"
      name: "Argissolos Bruno-Acinzentados Ta Aluminicos tipicos"
      tests:
        default: true

  # ----- 1.2 PBAC Aluminicos -- 2 subgrupos -----
  "PBACal":
    - code: "PBACalAb"
      name: "Argissolos Bruno-Acinzentados Aluminicos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PBACalTp"
      name: "Argissolos Bruno-Acinzentados Aluminicos tipicos"
      tests:
        default: true

  # ----- 1.3 PBAC Distroficos -- 2 subgrupos -----
  "PBACd":
    - code: "PBACdAb"
      name: "Argissolos Bruno-Acinzentados Distroficos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PBACdTp"
      name: "Argissolos Bruno-Acinzentados Distroficos tipicos"
      tests:
        default: true

  # ============================================================
  # v0.7.4.B.2 -- PAC subgrupos (Cap 5, pp 120-122) -- 21 SGs
  # ============================================================
  #
  # PACdc Distrocoesos: 9 SGs (arenicos, abrup+durico, abrup+fragipa,
  #   abrupticos, duricos, fragipanicos, plintossolicos, latossolicos,
  #   tipicos)
  # PACd  Distroficos:  9 SGs (mesmo padrao)
  # PACe  Eutroficos:   3 SGs (abrupticos, plintossolicos, tipicos)

  # ----- 2.1 PAC Distrocoesos -- 9 subgrupos (Cap 5, p 120) -----
  # Ordem canonica: arenicos > abrup+durico > abrup+fragipa >
  # abrupticos > duricos > fragipanicos > plintossolicos > latossolicos > tipicos.
  "PACdc":
    - code: "PACdcAr"
      name: "Argissolos Acinzentados Distrocoesos arenicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "PACdcAbDu"
      name: "Argissolos Acinzentados Distrocoesos abrupticos duricos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_durico: { max_depth_cm: 150 }
    - code: "PACdcAbFr"
      name: "Argissolos Acinzentados Distrocoesos abrupticos fragipanicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - fragipa: {}
    - code: "PACdcAb"
      name: "Argissolos Acinzentados Distrocoesos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PACdcDu"
      name: "Argissolos Acinzentados Distrocoesos duricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "PACdcFr"
      name: "Argissolos Acinzentados Distrocoesos fragipanicos"
      tests:
        all_of:
          - fragipa: {}
    - code: "PACdcPl"
      name: "Argissolos Acinzentados Distrocoesos plintossolicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PACdcLa"
      name: "Argissolos Acinzentados Distrocoesos latossolicos"
      tests:
        all_of:
          - carater_latossolico: {}
    - code: "PACdcTp"
      name: "Argissolos Acinzentados Distrocoesos tipicos"
      tests:
        default: true

  # ----- 2.2 PAC Distroficos -- 9 subgrupos (Cap 5, p 121) -----
  # Mesmo padrao de 2.1.
  "PACd":
    - code: "PACdAr"
      name: "Argissolos Acinzentados Distroficos arenicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "PACdAbDu"
      name: "Argissolos Acinzentados Distroficos abrupticos duricos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_durico: { max_depth_cm: 150 }
    - code: "PACdAbFr"
      name: "Argissolos Acinzentados Distroficos abrupticos fragipanicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - fragipa: {}
    - code: "PACdAb"
      name: "Argissolos Acinzentados Distroficos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PACdDu"
      name: "Argissolos Acinzentados Distroficos duricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "PACdFr"
      name: "Argissolos Acinzentados Distroficos fragipanicos"
      tests:
        all_of:
          - fragipa: {}
    - code: "PACdPl"
      name: "Argissolos Acinzentados Distroficos plintossolicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PACdLa"
      name: "Argissolos Acinzentados Distroficos latossolicos"
      tests:
        all_of:
          - carater_latossolico: {}
    - code: "PACdTp"
      name: "Argissolos Acinzentados Distroficos tipicos"
      tests:
        default: true

  # ----- 2.3 PAC Eutroficos -- 3 subgrupos (Cap 5, p 122) -----
  "PACe":
    - code: "PACeAb"
      name: "Argissolos Acinzentados Eutroficos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PACePl"
      name: "Argissolos Acinzentados Eutroficos plintossolicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PACeTp"
      name: "Argissolos Acinzentados Eutroficos tipicos"
      tests:
        default: true

  # ============================================================
  # v0.7.4.B.3 -- PVA subgrupos (Cap 5, pp 134-138) -- 36 SGs
  # ============================================================
  #
  # PVAtal Ta Aluminicos:    5 SGs
  # PVAal  Aluminicos:       5 SGs
  # PVAtd  Ta Distroficos:   4 SGs
  # PVAd   Distroficos:     11 SGs (espessarenicos, arenicos, petroplinticos,
  #                                  plintossolicos, planossolicos,
  #                                  nitossolicos, latossolicos, etc.)
  # PVAe   Eutroficos:      11 SGs (leptofragmentarios, lepticos,
  #                                  saproliticos, abrupticos compostos,
  #                                  luvissolicos, planossolicos,
  #                                  nitossolicos, latossolicos)

  # ----- 5.1 PVA Ta Aluminicos -- 5 subgrupos (Cap 5, p 134-135) -----
  "PVAtal":
    - code: "PVAtalAb"
      name: "Argissolos Vermelho-Amarelos Ta Aluminicos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAtalPl"
      name: "Argissolos Vermelho-Amarelos Ta Aluminicos plintossolicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PVAtalEpRx"
      name: "Argissolos Vermelho-Amarelos Ta Aluminicos epirredoxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 50 }
    - code: "PVAtalEnRx"
      name: "Argissolos Vermelho-Amarelos Ta Aluminicos endorredoxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 150 }
    - code: "PVAtalTp"
      name: "Argissolos Vermelho-Amarelos Ta Aluminicos tipicos"
      tests:
        default: true

  # ----- 5.2 PVA Aluminicos -- 5 subgrupos (Cap 5, p 135) -----
  "PVAal":
    - code: "PVAalAb"
      name: "Argissolos Vermelho-Amarelos Aluminicos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAalPl"
      name: "Argissolos Vermelho-Amarelos Aluminicos plintossolicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PVAalEpRx"
      name: "Argissolos Vermelho-Amarelos Aluminicos epirredoxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 50 }
    - code: "PVAalEnRx"
      name: "Argissolos Vermelho-Amarelos Aluminicos endorredoxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 150 }
    - code: "PVAalTp"
      name: "Argissolos Vermelho-Amarelos Aluminicos tipicos"
      tests:
        default: true

  # ----- 5.3 PVA Ta Distroficos -- 4 subgrupos (Cap 5, p 135-136) -----
  "PVAtd":
    - code: "PVAtdAb"
      name: "Argissolos Vermelho-Amarelos Ta Distroficos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAtdEpRx"
      name: "Argissolos Vermelho-Amarelos Ta Distroficos epirredoxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 50 }
    - code: "PVAtdEnRx"
      name: "Argissolos Vermelho-Amarelos Ta Distroficos endorredoxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 150 }
    - code: "PVAtdTp"
      name: "Argissolos Vermelho-Amarelos Ta Distroficos tipicos"
      tests:
        default: true

  # ----- 5.4 PVA Distroficos -- 11 subgrupos (Cap 5, p 136-137) -----
  # Ordem canonica: espessarenico+abrupt > espessarenico > arenico+abrupt >
  # arenico > abrupticos > petroplinticos > plintossolicos > planossolicos >
  # nitossolicos > latossolicos > tipicos.
  "PVAd":
    - code: "PVAdEsAb"
      name: "Argissolos Vermelho-Amarelos Distroficos espessarenicos abrupticos"
      tests:
        all_of:
          - carater_espessarenico: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAdEs"
      name: "Argissolos Vermelho-Amarelos Distroficos espessarenicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "PVAdArAb"
      name: "Argissolos Vermelho-Amarelos Distroficos arenicos abrupticos"
      tests:
        all_of:
          - carater_arenico: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAdAr"
      name: "Argissolos Vermelho-Amarelos Distroficos arenicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "PVAdAb"
      name: "Argissolos Vermelho-Amarelos Distroficos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAdPp"
      name: "Argissolos Vermelho-Amarelos Distroficos petroplinticos"
      tests:
        all_of:
          - carater_petroplintico: {}
    - code: "PVAdPl"
      name: "Argissolos Vermelho-Amarelos Distroficos plintossolicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PVAdPs"
      name: "Argissolos Vermelho-Amarelos Distroficos planossolicos"
      tests:
        all_of:
          - carater_planossolico: {}
    - code: "PVAdNi"
      name: "Argissolos Vermelho-Amarelos Distroficos nitossolicos"
      tests:
        all_of:
          - carater_nitossolico: {}
    - code: "PVAdLa"
      name: "Argissolos Vermelho-Amarelos Distroficos latossolicos"
      tests:
        all_of:
          - carater_latossolico: {}
    - code: "PVAdTp"
      name: "Argissolos Vermelho-Amarelos Distroficos tipicos"
      tests:
        default: true

  # ----- 5.5 PVA Eutroficos -- 11 subgrupos (Cap 5, p 137-138) -----
  # Ordem canonica: leptofrag+abrupt > leptico+abrupt > saprol+abrupt+chern >
  # abrupt+plintic > abrupt+planossolic > abrupticos > luvissolicos >
  # planossolicos > nitossolicos > latossolicos > tipicos.
  "PVAe":
    - code: "PVAeLfAb"
      name: "Argissolos Vermelho-Amarelos Eutroficos leptofragmentarios abrupticos"
      tests:
        all_of:
          - carater_leptofragmentario: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAeLeAb"
      name: "Argissolos Vermelho-Amarelos Eutroficos lepticos abrupticos"
      tests:
        all_of:
          - carater_leptico: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAeSpAbCh"
      name: "Argissolos Vermelho-Amarelos Eutroficos saproliticos abrupticos chernossolicos"
      tests:
        all_of:
          - carater_saprolitico: {}
          - mudanca_textural_abrupta: {}
          - carater_chernossolico: {}
    - code: "PVAeAbPl"
      name: "Argissolos Vermelho-Amarelos Eutroficos abrupticos plintossolicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_plintico: {}
    - code: "PVAeAbPs"
      name: "Argissolos Vermelho-Amarelos Eutroficos abrupticos planossolicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_planossolico: {}
    - code: "PVAeAb"
      name: "Argissolos Vermelho-Amarelos Eutroficos abrupticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAeLu"
      name: "Argissolos Vermelho-Amarelos Eutroficos luvissolicos"
      tests:
        all_of:
          - carater_luvissolico: {}
    - code: "PVAePs"
      name: "Argissolos Vermelho-Amarelos Eutroficos planossolicos"
      tests:
        all_of:
          - carater_planossolico: {}
    - code: "PVAeNi"
      name: "Argissolos Vermelho-Amarelos Eutroficos nitossolicos"
      tests:
        all_of:
          - carater_nitossolico: {}
    - code: "PVAeLa"
      name: "Argissolos Vermelho-Amarelos Eutroficos latossolicos"
      tests:
        all_of:
          - carater_latossolico: {}
    - code: "PVAeTp"
      name: "Argissolos Vermelho-Amarelos Eutroficos tipicos"
      tests:
        default: true
