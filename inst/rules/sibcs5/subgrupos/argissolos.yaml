          - carater_espodico: {}
    - code: "PAdcAbFr"
      name: "Argissolos Amarelos Distrocoesos abrúpticos fragipânicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - fragipa: {}
    - code: "PAdcAbPp"
      name: "Argissolos Amarelos Distrocoesos abrúpticos petroplínticos"
      tests:
        all_of:
