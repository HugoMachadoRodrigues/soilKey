          - fragipa: {}
    - code: "PAdcAr"
      name: "Argissolos Amarelos Distrocoesos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "PAdcAbFrEp"
      name: "Argissolos Amarelos Distrocoesos abrúpticos fragipânicos espodossólicos"
      tests:
        all_of:
