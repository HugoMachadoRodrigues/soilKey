  # ----- 5.4 PVA Distroficos -- 11 subgrupos (Cap 5, p 136-137) -----
  # Ordem canonica: espessarenico+abrupt > espessarenico > arenico+abrupt >
  # arenico > abrupticos > petroplinticos > plintossolicos > planossolicos >
  # nitossolicos > latossolicos > tipicos.
  "PVAd":
    - code: "PVAdEsAb"
      name: "Argissolos Vermelho-Amarelos Distróficos espessarênicos abrúpticos"
      tests:
        all_of:
          - carater_espessarenico: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAdEs"
      name: "Argissolos Vermelho-Amarelos Distróficos espessarênicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "PVAdArAb"
      name: "Argissolos Vermelho-Amarelos Distróficos arênicos abrúpticos"
      tests:
        all_of:
          - carater_arenico: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAdAr"
      name: "Argissolos Vermelho-Amarelos Distróficos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "PVAdAb"
      name: "Argissolos Vermelho-Amarelos Distróficos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAdPp"
      name: "Argissolos Vermelho-Amarelos Distróficos petroplínticos"
      tests:
        all_of:
