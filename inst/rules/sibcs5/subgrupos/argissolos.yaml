          - carater_petroplintico: {}
    - code: "PAdcAbPl"
      name: "Argissolos Amarelos Distrocoesos abrúpticos plintossólicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_plintico: {}
    - code: "PAdcAbEp"
      name: "Argissolos Amarelos Distrocoesos abrúpticos espodossólicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_espodico: {}
    - code: "PAdcAb"
      name: "Argissolos Amarelos Distrocoesos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PAdcPcFr"
      name: "Argissolos Amarelos Distrocoesos plácicos fragipânicos"
      tests:
        all_of:
          - carater_placico: {}
          - fragipa: {}
    - code: "PAdcFrPl"
      name: "Argissolos Amarelos Distrocoesos fragipânicos plintossólicos"
      tests:
        all_of:
          - fragipa: {}
          - carater_plintico: {}
    - code: "PAdcFrEp"
      name: "Argissolos Amarelos Distrocoesos fragipânicos espodossólicos"
      tests:
        all_of:
          - fragipa: {}
          - carater_espodico: {}
    - code: "PAdcFrPs"
      name: "Argissolos Amarelos Distrocoesos fragipânicos planossólicos"
      tests:
        all_of:
          - fragipa: {}
          - carater_planossolico: {}
    - code: "PAdcFr"
      name: "Argissolos Amarelos Distrocoesos fragipânicos"
      tests:
        all_of:
          - fragipa: {}
    - code: "PAdcPl"
      name: "Argissolos Amarelos Distrocoesos plintossólicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PAdcEp"
      name: "Argissolos Amarelos Distrocoesos espodossólicos"
      tests:
        all_of:
          - carater_espodico: {}
