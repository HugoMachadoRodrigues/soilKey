# =============================================================
# SiBCS 5a edicao -- Argissolos (Cap 5, pp 119-138)
#
# Subgrupos (4o nivel categorico) -- ~165 classes em 23 GGs (5
# subordens). Wirados em 3 stages sequenciais:
#
#   v0.7.4.B.1 -- PBAC subgrupos (8 classes)        ESTE COMMIT
#   v0.7.4.B.2 -- PAC subgrupos  (21 classes)       proximo commit
#   v0.7.4.B.3 -- PVA subgrupos  (36 classes)
#   v0.7.4.C   -- PA + PV subgrupos (~100 classes)
#
# Codigos: 6-12 chars, sempre comecando com o GG code (PBACtal,
# PBACal, PBACd) + 2-4 char suffix em camelCase descritivo.
# Cada GG termina com sufixo "Tp" (catch-all 'tipicos').
# =============================================================

subgrupos:

  # ============================================================
  # v0.7.4.B.1 -- PBAC subgrupos (Cap 5, p 119)
  # ============================================================
  #
  # PBACtal: 4 SGs canonicos (Ta_Al com espesso-humico tipico do RS)
  # PBACal:  2 SGs (abrupticos / tipicos)
  # PBACd:   2 SGs (abrupticos / tipicos)

  # ----- 1.1 PBAC Ta Aluminicos -- 4 subgrupos -----
  "PBACtal":
    - code: "PBACtalAb"
      name: "Argissolos Bruno-Acinzentados Ta Alumínicos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PBACtalEh"
      name: "Argissolos Bruno-Acinzentados Ta Alumínicos espesso-húmicos"
      tests:
        all_of:
          - carater_humico_espesso: {}
    - code: "PBACtalHu"
      name: "Argissolos Bruno-Acinzentados Ta Alumínicos húmicos"
      tests:
        all_of:
          - horizonte_A_humico: {}
    - code: "PBACtalTp"
      name: "Argissolos Bruno-Acinzentados Ta Alumínicos típicos"
      tests:
        default: true

  # ----- 1.2 PBAC Aluminicos -- 2 subgrupos -----
  "PBACal":
    - code: "PBACalAb"
      name: "Argissolos Bruno-Acinzentados Alumínicos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PBACalTp"
      name: "Argissolos Bruno-Acinzentados Alumínicos típicos"
      tests:
        default: true

  # ----- 1.3 PBAC Distroficos -- 2 subgrupos -----
  "PBACd":
    - code: "PBACdAb"
      name: "Argissolos Bruno-Acinzentados Distróficos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PBACdTp"
      name: "Argissolos Bruno-Acinzentados Distróficos típicos"
      tests:
        default: true

  # ============================================================
  # v0.7.4.B.2 -- PAC subgrupos (Cap 5, pp 120-122) -- 21 SGs
  # ============================================================
  #
  # PACdc Distrocoesos: 9 SGs (arenicos, abrup+durico, abrup+fragipa,
  #   abrupticos, duricos, fragipanicos, plintossolicos, latossolicos,
  #   tipicos)
  # PACd  Distroficos:  9 SGs (mesmo padrao)
  # PACe  Eutroficos:   3 SGs (abrupticos, plintossolicos, tipicos)

  # ----- 2.1 PAC Distrocoesos -- 9 subgrupos (Cap 5, p 120) -----
  # Ordem canonica: arenicos > abrup+durico > abrup+fragipa >
  # abrupticos > duricos > fragipanicos > plintossolicos > latossolicos > tipicos.
  "PACdc":
    - code: "PACdcAr"
      name: "Argissolos Acinzentados Distrocoesos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "PACdcAbDu"
      name: "Argissolos Acinzentados Distrocoesos abrúpticos dúricos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_durico: { max_depth_cm: 150 }
    - code: "PACdcAbFr"
      name: "Argissolos Acinzentados Distrocoesos abrúpticos fragipânicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - fragipa: {}
    - code: "PACdcAb"
      name: "Argissolos Acinzentados Distrocoesos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PACdcDu"
      name: "Argissolos Acinzentados Distrocoesos dúricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "PACdcFr"
      name: "Argissolos Acinzentados Distrocoesos fragipânicos"
      tests:
        all_of:
          - fragipa: {}
    - code: "PACdcPl"
      name: "Argissolos Acinzentados Distrocoesos plintossólicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PACdcLa"
      name: "Argissolos Acinzentados Distrocoesos latossólicos"
      tests:
        all_of:
          - carater_latossolico: {}
    - code: "PACdcTp"
      name: "Argissolos Acinzentados Distrocoesos típicos"
      tests:
        default: true

  # ----- 2.2 PAC Distroficos -- 9 subgrupos (Cap 5, p 121) -----
  # Mesmo padrao de 2.1.
  "PACd":
    - code: "PACdAr"
      name: "Argissolos Acinzentados Distróficos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "PACdAbDu"
      name: "Argissolos Acinzentados Distróficos abrúpticos dúricos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_durico: { max_depth_cm: 150 }
    - code: "PACdAbFr"
      name: "Argissolos Acinzentados Distróficos abrúpticos fragipânicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - fragipa: {}
    - code: "PACdAb"
      name: "Argissolos Acinzentados Distróficos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PACdDu"
      name: "Argissolos Acinzentados Distróficos dúricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "PACdFr"
      name: "Argissolos Acinzentados Distróficos fragipânicos"
      tests:
        all_of:
          - fragipa: {}
    - code: "PACdPl"
      name: "Argissolos Acinzentados Distróficos plintossólicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PACdLa"
      name: "Argissolos Acinzentados Distróficos latossólicos"
      tests:
        all_of:
          - carater_latossolico: {}
    - code: "PACdTp"
      name: "Argissolos Acinzentados Distróficos típicos"
      tests:
        default: true

  # ----- 2.3 PAC Eutroficos -- 3 subgrupos (Cap 5, p 122) -----
  "PACe":
    - code: "PACeAb"
      name: "Argissolos Acinzentados Eutróficos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PACePl"
      name: "Argissolos Acinzentados Eutróficos plintossólicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PACeTp"
      name: "Argissolos Acinzentados Eutróficos típicos"
      tests:
        default: true

  # ============================================================
  # v0.7.4.B.3 -- PVA subgrupos (Cap 5, pp 134-138) -- 36 SGs
  # ============================================================
  #
  # PVAtal Ta Aluminicos:    5 SGs
  # PVAal  Aluminicos:       5 SGs
  # PVAtd  Ta Distroficos:   4 SGs
  # PVAd   Distroficos:     11 SGs (espessarenicos, arenicos, petroplinticos,
  #                                  plintossolicos, planossolicos,
  #                                  nitossolicos, latossolicos, etc.)
  # PVAe   Eutroficos:      11 SGs (leptofragmentarios, lepticos,
  #                                  saproliticos, abrupticos compostos,
  #                                  luvissolicos, planossolicos,
  #                                  nitossolicos, latossolicos)

  # ----- 5.1 PVA Ta Aluminicos -- 5 subgrupos (Cap 5, p 134-135) -----
  "PVAtal":
    - code: "PVAtalAb"
      name: "Argissolos Vermelho-Amarelos Ta Alumínicos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAtalPl"
      name: "Argissolos Vermelho-Amarelos Ta Alumínicos plintossólicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PVAtalEpRx"
      name: "Argissolos Vermelho-Amarelos Ta Alumínicos epirredóxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 50 }
    - code: "PVAtalEnRx"
      name: "Argissolos Vermelho-Amarelos Ta Alumínicos endorredóxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 150 }
    - code: "PVAtalTp"
      name: "Argissolos Vermelho-Amarelos Ta Alumínicos típicos"
      tests:
        default: true

  # ----- 5.2 PVA Aluminicos -- 5 subgrupos (Cap 5, p 135) -----
  "PVAal":
    - code: "PVAalAb"
      name: "Argissolos Vermelho-Amarelos Alumínicos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAalPl"
      name: "Argissolos Vermelho-Amarelos Alumínicos plintossólicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PVAalEpRx"
      name: "Argissolos Vermelho-Amarelos Alumínicos epirredóxicos"
      tests:
        all_of:
          - carater_redoxico: { max_top_cm: 50 }
    - code: "PVAalEnRx"
      name: "Argissolos Vermelho-Amarelos Alumínicos endorredóxicos"
