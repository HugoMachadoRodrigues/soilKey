    - code: "PVAdPl"
      name: "Argissolos Vermelho-Amarelos Distróficos plintossólicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "PVAdPs"
      name: "Argissolos Vermelho-Amarelos Distróficos planossólicos"
      tests:
        all_of:
          - carater_planossolico: {}
    - code: "PVAdNi"
      name: "Argissolos Vermelho-Amarelos Distróficos nitossólicos"
      tests:
        all_of:
          - carater_nitossolico: {}
    - code: "PVAdLa"
      name: "Argissolos Vermelho-Amarelos Distróficos latossólicos"
      tests:
        all_of:
          - carater_latossolico: {}
    - code: "PVAdTp"
      name: "Argissolos Vermelho-Amarelos Distróficos típicos"
      tests:
        default: true

  # ----- 5.5 PVA Eutroficos -- 11 subgrupos (Cap 5, p 137-138) -----
  # Ordem canonica: leptofrag+abrupt > leptico+abrupt > saprol+abrupt+chern >
  # abrupt+plintic > abrupt+planossolic > abrupticos > luvissolicos >
  # planossolicos > nitossolicos > latossolicos > tipicos.
  "PVAe":
    - code: "PVAeLfAb"
      name: "Argissolos Vermelho-Amarelos Eutróficos leptofragmentários abrúpticos"
      tests:
        all_of:
          - carater_leptofragmentario: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAeLeAb"
      name: "Argissolos Vermelho-Amarelos Eutróficos lépticos abrúpticos"
      tests:
        all_of:
          - carater_leptico: {}
          - mudanca_textural_abrupta: {}
    - code: "PVAeSpAbCh"
      name: "Argissolos Vermelho-Amarelos Eutróficos saprolíticos abrúpticos chernossólicos"
      tests:
        all_of:
          - carater_saprolitico: {}
          - mudanca_textural_abrupta: {}
          - carater_chernossolico: {}
    - code: "PVAeAbPl"
      name: "Argissolos Vermelho-Amarelos Eutróficos abrúpticos plintossólicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_plintico: {}
    - code: "PVAeAbPs"
      name: "Argissolos Vermelho-Amarelos Eutróficos abrúpticos planossólicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_planossolico: {}
    - code: "PVAeAb"
      name: "Argissolos Vermelho-Amarelos Eutróficos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "PVAeLu"
      name: "Argissolos Vermelho-Amarelos Eutróficos luvissólicos"
      tests:
