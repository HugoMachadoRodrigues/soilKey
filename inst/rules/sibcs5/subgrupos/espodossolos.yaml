# =============================================================
# SiBCS 5a edicao -- Espodossolos (Cap 8, pp 169-174)
#
# Subgrupos (4o nivel categorico) -- 42 classes em 12 GGs:
#
#   EKhh / EJhh / EShh: 2+2+2 = 6 SGs (organossolicos / tipicos)
#   EKhm / EJhm / EShm: 5+5+5 = 15 SGs (espessarenicos / arenicos /
#                                        duricos / organossolicos / tipicos)
#   EKhe / EJhe / EShe: 1+1+1 = 3 SGs (typicos)
#   EKo  / EJo:           5+5 = 10 SGs (espessarenicos / arenicos /
#                                        duricos / fragipanicos / tipicos)
#   ESo:                        8 SGs (carbonaticos / eutricos+arenicos /
#                                       eutricos / espessarenicos / arenicos /
#                                       duricos / fragipanicos / tipicos)
#
# "Organossolicos" = horizonte_histico em camada (sem atender espessura
# para Organossolos -- garantido pelo dispatcher que ja sabe que eh
# Espodossolo).
#
# "Eutricos" do ESo 3.4.2/3.4.3 = carater_eutrico (existing).
# =============================================================

subgrupos:

  # ============================================================
  # EKhh / EJhh / EShh -- Hidro-hiperespessos (mesmo padrao)
  # ============================================================
  "EKhh":
    - code: "EKhhOg"
      name: "Espodossolos Humilúvicos Hidro-hiperespessos organossólicos"
      tests:
        all_of:
          - horizonte_histico: {}
    - code: "EKhhTp"
      name: "Espodossolos Humilúvicos Hidro-hiperespessos típicos"
      tests:
        default: true
  "EJhh":
    - code: "EJhhOg"
      name: "Espodossolos Ferrilúvicos Hidro-hiperespessos organossólicos"
      tests:
        all_of:
          - horizonte_histico: {}
    - code: "EJhhTp"
      name: "Espodossolos Ferrilúvicos Hidro-hiperespessos típicos"
      tests:
        default: true
  "EShh":
    - code: "EShhOg"
      name: "Espodossolos Ferri-humilúvicos Hidro-hiperespessos organossólicos"
      tests:
        all_of:
          - horizonte_histico: {}
    - code: "EShhTp"
      name: "Espodossolos Ferri-humilúvicos Hidro-hiperespessos típicos"
      tests:
        default: true

  # ============================================================
  # EKhm / EJhm / EShm -- Hidromorficos (mesmo padrao 5 SGs)
  # ============================================================
  "EKhm":
    - code: "EKhmEs"
      name: "Espodossolos Humilúvicos Hidromórficos espessarênicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "EKhmAr"
      name: "Espodossolos Humilúvicos Hidromórficos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "EKhmDu"
      name: "Espodossolos Humilúvicos Hidromórficos dúricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "EKhmOg"
      name: "Espodossolos Humilúvicos Hidromórficos organossólicos"
      tests:
        all_of:
          - horizonte_histico: {}
    - code: "EKhmTp"
      name: "Espodossolos Humilúvicos Hidromórficos típicos"
      tests:
        default: true
  "EJhm":
    - code: "EJhmEs"
      name: "Espodossolos Ferrilúvicos Hidromórficos espessarênicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "EJhmAr"
      name: "Espodossolos Ferrilúvicos Hidromórficos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "EJhmDu"
      name: "Espodossolos Ferrilúvicos Hidromórficos dúricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "EJhmOg"
      name: "Espodossolos Ferrilúvicos Hidromórficos organossólicos"
      tests:
        all_of:
          - horizonte_histico: {}
    - code: "EJhmTp"
      name: "Espodossolos Ferrilúvicos Hidromórficos típicos"
      tests:
        default: true
  "EShm":
    - code: "EShmEs"
      name: "Espodossolos Ferri-humilúvicos Hidromórficos espessarênicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "EShmAr"
      name: "Espodossolos Ferri-humilúvicos Hidromórficos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "EShmDu"
      name: "Espodossolos Ferri-humilúvicos Hidromórficos dúricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "EShmOg"
      name: "Espodossolos Ferri-humilúvicos Hidromórficos organossólicos"
      tests:
        all_of:
          - horizonte_histico: {}
    - code: "EShmTp"
      name: "Espodossolos Ferri-humilúvicos Hidromórficos típicos"
      tests:
        default: true

  # ============================================================
  # EKhe / EJhe / EShe -- Hiperespessos (catch-all only, 1 SG cada)
  # ============================================================
  "EKhe":
    - code: "EKheTp"
      name: "Espodossolos Humilúvicos Hiperespessos típicos"
      tests:
        default: true
  "EJhe":
    - code: "EJheTp"
      name: "Espodossolos Ferrilúvicos Hiperespessos típicos"
      tests:
        default: true
  "EShe":
    - code: "ESheTp"
      name: "Espodossolos Ferri-humilúvicos Hiperespessos típicos"
      tests:
        default: true

  # ============================================================
  # EKo / EJo -- Orticos (mesmo padrao 5 SGs)
  # ============================================================
  "EKo":
    - code: "EKoEs"
      name: "Espodossolos Humilúvicos Órticos espessarênicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "EKoAr"
      name: "Espodossolos Humilúvicos Órticos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "EKoDu"
      name: "Espodossolos Humilúvicos Órticos dúricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "EKoFr"
      name: "Espodossolos Humilúvicos Órticos fragipânicos"
      tests:
        all_of:
          - fragipa: {}
    - code: "EKoTp"
      name: "Espodossolos Humilúvicos Órticos típicos"
      tests:
        default: true
  "EJo":
    - code: "EJoEs"
      name: "Espodossolos Ferrilúvicos Órticos espessarênicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "EJoAr"
      name: "Espodossolos Ferrilúvicos Órticos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "EJoDu"
      name: "Espodossolos Ferrilúvicos Órticos dúricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "EJoFr"
      name: "Espodossolos Ferrilúvicos Órticos fragipânicos"
      tests:
        all_of:
          - fragipa: {}
    - code: "EJoTp"
      name: "Espodossolos Ferrilúvicos Órticos típicos"
      tests:
        default: true

  # ============================================================
  # ESo -- Ferri-humiluvicos Orticos -- 8 SGs
  # ============================================================
  "ESo":
    - code: "ESoCa"
      name: "Espodossolos Ferri-humilúvicos Órticos carbonáticos"
      tests:
        all_of:
          - carater_carbonatico: { max_depth_cm: 150 }
    - code: "ESoEuAr"
      name: "Espodossolos Ferri-humilúvicos Órticos êutricos arênicos"
      tests:
        all_of:
          - carater_eutrico: {}
          - carater_arenico: {}
    - code: "ESoEu"
      name: "Espodossolos Ferri-humilúvicos Órticos êutricos"
      tests:
        all_of:
          - carater_eutrico: {}
    - code: "ESoEs"
      name: "Espodossolos Ferri-humilúvicos Órticos espessarênicos"
      tests:
        all_of:
          - carater_espessarenico: {}
    - code: "ESoAr"
      name: "Espodossolos Ferri-humilúvicos Órticos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "ESoDu"
      name: "Espodossolos Ferri-humilúvicos Órticos dúricos"
      tests:
        all_of:
          - carater_durico: { max_depth_cm: 150 }
    - code: "ESoFr"
      name: "Espodossolos Ferri-humilúvicos Órticos fragipânicos"
      tests:
        all_of:
          - fragipa: {}
    - code: "ESoTp"
      name: "Espodossolos Ferri-humilúvicos Órticos típicos"
      tests:
        default: true
