# =============================================================
# SiBCS 5a edicao -- Latossolos (Cap 10, pp 199-212)
#
# Subgrupos (4o nivel categorico) -- 99 classes em 25 GGs.
#
# Codigos suffix: Ru=rubrico, Eh=espesso-humico, Hu=humico,
# Pp=petroplintico, Pl=plintossolico, Ar=argissolico, An=antropico,
# Ps=psamitico, Cb=cambissolico (LA/LV/LVA: minerais alteraveis +
# frag rocha em B), Rt=retratico (carater_retratil), Tp=tipico.
#
# Cap 10 reusa massivamente carater_acrico, ferrico, perferrico,
# alitico, coeso, retratil, plintico, petroplintico, argiluvico,
# cambissolico_arg, antropico, humico, espesso_humico, e os novos
# carater_rubrico (LB) + carater_psamitico (LA Distroficos).
# =============================================================

subgrupos:

  # ============================================================
  # LB -- Latossolos Brunos (Cap 10, pp 199-200) -- 10 SGs
  # ============================================================
  "LBaf":
    - code: "LBafRu"
      name: "Latossolos Brunos Aluminoférricos rúbricos"
      tests:
        all_of:
          - carater_rubrico: {}
    - code: "LBafTp"
      name: "Latossolos Brunos Aluminoférricos típicos"
      tests:
        default: true
  "LBal":
    - code: "LBalRu"
      name: "Latossolos Brunos Alumínicos rúbricos"
