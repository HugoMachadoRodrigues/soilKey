# =============================================================
# SiBCS 5a edicao -- Plintossolos (Cap 16, pp 263-272)
#
# Subgrupos -- 73 classes em 9 GGs.
# Codigos suffix:
#   Ar=arenicos, Ea=espessarenicos, Es=espessos, En=endicos,
#   Gl=gleissolicos, Hu=humicos, Tp=tipicos, Lf=fragmentarios,
#   Lt=liticos, Lpf=leptofragmentarios, Lp=lepticos, Eu=eutricos,
#   Arg=argissolicos, La=latossolicos, Ca=cambissolicos,
#   Sd=solodicos, Ab=abrupticos, Pp=petroplinticos, GlHu=gleiss+humicos.
# =============================================================

subgrupos:

  # -- FF Petricos -----
  "FFlp":
    - code: "FFlpAr"
      name: "Plintossolos Pétricos Litoplínticos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "FFlpEn"
      name: "Plintossolos Pétricos Litoplínticos êndicos"
      tests:
        all_of:
          - subgrupo_plintossolo_endico_litoplintico: {}
    - code: "FFlpGl"
      name: "Plintossolos Pétricos Litoplínticos gleissólicos"
      tests:
        all_of:
          - carater_gleissolico: { max_depth_cm: 150 }
    - code: "FFlpHu"
      name: "Plintossolos Pétricos Litoplínticos húmicos"
      tests:
        all_of:
          - horizonte_A_humico: {}
    - code: "FFlpTp"
      name: "Plintossolos Pétricos Litoplínticos típicos"
      tests:
        default: true

  "FFco":
    - code: "FFcoLf"
      name: "Plintossolos Pétricos Concrecionários fragmentários"
      tests:
        all_of:
          - contato_litico_fragmentario: { max_depth_cm: 50 }
    - code: "FFcoLt"
      name: "Plintossolos Pétricos Concrecionários líticos"
      tests:
        all_of:
          - contato_litico: { max_depth_cm: 50 }
    - code: "FFcoLpf"
      name: "Plintossolos Pétricos Concrecionários leptofragmentários"
      tests:
        all_of:
          - carater_leptofragmentario: {}
    - code: "FFcoLp"
      name: "Plintossolos Pétricos Concrecionários lépticos"
      tests:
        all_of:
          - carater_leptico: {}
    - code: "FFcoEu"
      name: "Plintossolos Pétricos Concrecionários êutricos"
      tests:
        all_of:
          - carater_eutrico: {}
    - code: "FFcoEn"
      name: "Plintossolos Pétricos Concrecionários êndicos"
      tests:
        all_of:
          - subgrupo_plintossolo_endico_concrecionario: {}
    - code: "FFcoGl"
      name: "Plintossolos Pétricos Concrecionários gleissólicos"
      tests:
        all_of:
          - carater_gleissolico: { max_depth_cm: 150 }
    - code: "FFcoArg"
      name: "Plintossolos Pétricos Concrecionários argissólicos"
      tests:
        all_of:
          - carater_argiluvico: {}
    - code: "FFcoLa"
      name: "Plintossolos Pétricos Concrecionários latossólicos"
      tests:
        all_of:
          - carater_latossolico: {}
    - code: "FFcoCa"
      name: "Plintossolos Pétricos Concrecionários cambissólicos"
      tests:
        all_of:
          - carater_cambissolico_arg: {}
    - code: "FFcoHu"
      name: "Plintossolos Pétricos Concrecionários húmicos"
      tests:
        all_of:
          - horizonte_A_humico: {}
    - code: "FFcoTp"
      name: "Plintossolos Pétricos Concrecionários típicos"
      tests:
        default: true

