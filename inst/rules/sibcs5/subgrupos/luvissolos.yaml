# =============================================================
# SiBCS 5a edicao -- Luvissolos (Cap 11, pp 214-218)
#
# Subgrupos -- 33 classes em 5 GGs:
#   TCca: 3 SGs (Vs / Ps / Tp)
#   TCp:  9 SGs (Sp / Ar / AbPl / Ab / Vs / Pp / Ps / Cb / Tp)
#   TCo: 10 SGs (Fr / Li / Sa / SoVs / SoPs / So / VsPs / Vs / Ps / Tp)
#   TXp:  8 SGs (HC / SoPl / AbPl / Ab / FrPl / Gl / Pl / Tp)
#   TXo:  3 SGs (Gl / Ps / Tp)
# =============================================================

subgrupos:

  "TCca":
    - code: "TCcaVs"
      name: "Luvissolos Crômicos Carbonáticos vertissólicos"
      tests:
        all_of:
          - carater_vertissolico: { max_depth_cm: 100 }
    - code: "TCcaPs"
      name: "Luvissolos Crômicos Carbonáticos planossólicos"
      tests:
        all_of:
          - carater_planossolico: { max_depth_cm: 100 }
    - code: "TCcaTp"
      name: "Luvissolos Crômicos Carbonáticos típicos"
      tests:
        default: true

  "TCp":
    - code: "TCpSp"
      name: "Luvissolos Crômicos Pálicos saprolíticos"
      tests:
        all_of:
          - carater_saprolitico: {}
    - code: "TCpAr"
      name: "Luvissolos Crômicos Pálicos arênicos"
      tests:
        all_of:
          - carater_arenico: {}
    - code: "TCpAbPl"
      name: "Luvissolos Crômicos Pálicos abrúpticos plintossólicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_plintico: {}
    - code: "TCpAb"
      name: "Luvissolos Crômicos Pálicos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "TCpVs"
      name: "Luvissolos Crômicos Pálicos vertissólicos"
      tests:
        all_of:
          - carater_vertissolico: {}
    - code: "TCpPp"
      name: "Luvissolos Crômicos Pálicos petroplínticos"
      tests:
        all_of:
          - carater_petroplintico: {}
    - code: "TCpPs"
      name: "Luvissolos Crômicos Pálicos planossólicos"
      tests:
        all_of:
          - carater_planossolico: {}
    - code: "TCpCb"
      name: "Luvissolos Crômicos Pálicos cambissólicos"
      tests:
        all_of:
          - carater_cambissolico_arg: {}
    - code: "TCpTp"
      name: "Luvissolos Crômicos Pálicos típicos"
      tests:
        default: true

  "TCo":
    - code: "TCoFr"
      name: "Luvissolos Crômicos Órticos fragmentários"
      tests:
        all_of:
          - contato_litico_fragmentario: { max_depth_cm: 50 }
    - code: "TCoLi"
      name: "Luvissolos Crômicos Órticos líticos"
      tests:
        all_of:
          - contato_litico: { max_depth_cm: 50 }
    - code: "TCoSa"
      name: "Luvissolos Crômicos Órticos salinos"
      tests:
        all_of:
          - carater_salino: { max_depth_cm: 100 }
    - code: "TCoSoVs"
      name: "Luvissolos Crômicos Órticos solódicos vertissólicos"
      tests:
        all_of:
          - carater_solodico: { max_depth_cm: 100 }
          - carater_vertissolico: { max_depth_cm: 100 }
    - code: "TCoSoPs"
      name: "Luvissolos Crômicos Órticos solódicos planossólicos"
      tests:
        all_of:
          - carater_solodico: { max_depth_cm: 100 }
          - carater_planossolico: { max_depth_cm: 100 }
    - code: "TCoSo"
      name: "Luvissolos Crômicos Órticos solódicos"
      tests:
        all_of:
          - carater_solodico: { max_depth_cm: 100 }
    - code: "TCoVsPs"
      name: "Luvissolos Crômicos Órticos vertissólicos planossólicos"
      tests:
        all_of:
          - carater_vertissolico: { max_depth_cm: 100 }
          - carater_planossolico: { max_depth_cm: 100 }
    - code: "TCoVs"
      name: "Luvissolos Crômicos Órticos vertissólicos"
      tests:
        all_of:
          - carater_vertissolico: { max_depth_cm: 100 }
    - code: "TCoPs"
      name: "Luvissolos Crômicos Órticos planossólicos"
      tests:
        all_of:
          - carater_planossolico: { max_depth_cm: 100 }
    - code: "TCoTp"
      name: "Luvissolos Crômicos Órticos típicos"
      tests:
        default: true

  "TXp":
    - code: "TXpHC"
      name: "Luvissolos Háplicos Pálicos hipocarbonáticos"
      tests:
        all_of:
          - carater_hipocarbonatico: { max_depth_cm: 150 }
    - code: "TXpSoPl"
      name: "Luvissolos Háplicos Pálicos solódicos plintossólicos"
      tests:
        all_of:
          - carater_solodico: { max_depth_cm: 150 }
          - carater_plintico: {}
    - code: "TXpAbPl"
      name: "Luvissolos Háplicos Pálicos abrúpticos plintossólicos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
          - carater_plintico: {}
    - code: "TXpAb"
      name: "Luvissolos Háplicos Pálicos abrúpticos"
      tests:
        all_of:
          - mudanca_textural_abrupta: {}
    - code: "TXpFrPl"
      name: "Luvissolos Háplicos Pálicos fragipânicos plintossólicos"
      tests:
        all_of:
          - fragipa: {}
          - carater_plintico: {}
    - code: "TXpGl"
      name: "Luvissolos Háplicos Pálicos gleissólicos"
      tests:
        all_of:
          - carater_gleissolico: {}
    - code: "TXpPl"
      name: "Luvissolos Háplicos Pálicos plintossólicos"
      tests:
        all_of:
          - carater_plintico: {}
    - code: "TXpTp"
      name: "Luvissolos Háplicos Pálicos típicos"
      tests:
        default: true

  "TXo":
    - code: "TXoGl"
      name: "Luvissolos Háplicos Órticos gleissólicos"
      tests:
        all_of:
          - carater_gleissolico: { max_depth_cm: 80 }
    - code: "TXoPs"
      name: "Luvissolos Háplicos Órticos planossólicos"
      tests:
        all_of:
          - carater_planossolico: { max_depth_cm: 100 }
    - code: "TXoTp"
      name: "Luvissolos Háplicos Órticos típicos"
      tests:
        default: true
