version: "WRB 2022 (4th ed.) -- Qualifier mapping per RSG (Ch 4 + Ch 5)"
implementation_status: "soilKey v0.9.1 -- Bloco A canonical lists (HS/AT/TC/CR/LP)"
source: |
  IUSS Working Group WRB (2022). World Reference Base for Soil
  Resources, 4th edition. Chapter 4 (RSG-specific principal-qualifier
  lists) + Chapter 5 (qualifier definitions) + Chapter 6 (codes).

# v0.9 wired ~50 core qualifier diagnostics. v0.9.1 extends those
# diagnostics for the first 5 RSGs of the canonical key (Bloco A):
# Histosols, Anthrosols, Technosols, Cryosols, Leptosols. Each RSG's
# `principal:` list now reproduces the full Ch 4 canonical principal
# order. Subsequent blocs (B...E) wire the remaining 27 RSGs in v0.9.1+.
#
# Qualifier name resolution: each entry name N maps to function
# qual_<tolower(N)>. The principals are tested in YAML order; every
# one whose function returns passed=TRUE is appended to the result
# in YAML order (so the prefix on the soil name follows Ch 4). When
# no principal passes, Haplic is the default.
#
# Some Ch 4 qualifiers still lack a backing diagnostic in v0.9.1 (the
# engine reports them as "function not implemented in v0.9" in the
# trace and skips them). They are listed here so the canonical Ch 4
# coverage stays visible; v0.9.2 will close the remaining gaps with
# schema-extension diagnostics. See R/qualifiers-wrb2022-v091.R for
# the v0.9.1 implementations and proxy notes.

rsg_qualifiers:

  HS:   # Histosols (WRB 2022 Ch 4)
    principal: [Floatic, Subaquatic, Tidalic, Thionic, Folic, Limnic,
                Technic, Toxic, Cryic, Salic, Calcaric, Sapric, Hemic,
                Fibric, Ombric, Rheic, Drainic, Andic, Mollic, Umbric,
                Skeletic]
