version: "WRB 2022 (4th edition)"
implementation_status: "soilKey v0.3.2 -- 32/32 RSGs wired in canonical key order"
source: |
  IUSS Working Group WRB (2022). World Reference Base for Soil Resources.
  International soil classification system for naming soils and creating
  legends for soil maps. 4th edition. International Union of Soil Sciences,
  Vienna.

# All 32 RSGs are wired in canonical WRB 2022 key order (Ch 4, pp 95-126).
# The first whose tests pass is assigned. Default catch-all is RG (Regosols).
#
# v0.3.2 reordering: PL (Planosols) and ST (Stagnosols) moved from positions
# 15-16 to their canonical positions 13-14 (between PT and NT). FL
# (Fluvisols) and AR (Arenosols) swapped (canonical: FL=30, AR=31). All 31
# canonical fixtures still classify to their intended RSG.
#
# v0.3 simplifications (documented in each diagnostic's roxygen):
#   - Histosols: histic_horizon detects 10cm contiguous organic from
#     surface only; cumulative-thickness variant is v0.4.
#   - Anthrosols: anthric_horizons uses designation pattern matching
#     hortic|irragric|plaggic|pretic|terric (5 horizon types).
#   - Technosols: only the artefacts >= 20% path is wired; the
#     geomembrane and technic-hard-material alternatives are v0.4.
#   - Cryosols: cryic_conditions detects via designation pattern (^Cf,
#     -f suffix, perma-); explicit permafrost depth is v0.4.
#   - Leptosols: leptic_features detects via R / Cr designation; the
#     coarse-fragments-90% alternative is v0.4.
#   - Solonetz: natric_horizon = argic + ESP >= 15.
#   - Andosols: andic_properties = (Al_ox + 0.5*Fe_ox) >= 2 AND
#     bulk_density <= 0.9; phosphate-retention and glass-content
#     alternatives are v0.4.
#   - Nitisols: nitic_horizon = clay >= 30 + Fe_DCB >= 4 +
#     thickness >= 30; polyhedral-structure / shiny-peds /
#     gradual-clay-decrease tests are v0.4.
#   - Planosols: planic_features = clay-doubling + abrupt boundary.
#   - Stagnosols: stagnic_properties = redox in shallow + decay
#     with depth (perched-water signature). gleyic_properties was
#     refined in v0.3 to require non-decay so GL and ST are mutually
#     exclusive.
#   - Retisols: retic_properties detects via glossic|retic|albeluvic
#     designation pattern.
#   - Fluvisols: fluvic_material = stratified texture + non-monotone
#     OC; the < 100-year-age criterion is implicit.

rsgs:

  - code: HS
    name: Histosols
    tests:
      all_of:
        - histic_horizon: {}

  - code: AT
    name: Anthrosols
    tests:
      all_of:
        - anthric_horizons: {}

  - code: TC
    name: Technosols
    tests:
      all_of:
        - technic_features: {}

  - code: CR
    name: Cryosols
    tests:
      all_of:
        - cryic_conditions: {}

  - code: LP
    name: Leptosols
    tests:
      all_of:
        - leptic_features: {}

  - code: SN
    name: Solonetz
    tests:
      all_of:
        - natric_horizon: {}

  - code: VR
    name: Vertisols
    tests:
      all_of:
        - vertisol: {}                  # v0.3.4: strict gate (vertic horizon + clay-throughout + cracks)

  - code: SC
    name: Solonchaks
    tests:
      all_of:
        - salic: {}

  - code: GL
    name: Gleysols
    tests:
      all_of:
        - gleysol: {}                   # v0.3.4: strict gate (gleyic + reducing + thickness)

  - code: AN
    name: Andosols
    tests:
      all_of:
        - andosol: {}                   # v0.3.4: strict gate (andic OR vitric, thickness, exclusions)

  - code: PZ
    name: Podzols
    tests:
      all_of:
        - spodic: {}

  - code: PT
    name: Plinthosols
    tests:
      all_of:
        - plinthic: {}

  - code: PL
    name: Planosols
    tests:
      all_of:
        - planosol: {}                  # v0.3.4: strict gate (abrupt + stagnic + reducing)

  - code: ST
    name: Stagnosols
    tests:
      all_of:
        - stagnic_properties: {}

  - code: NT
    name: Nitisols
    tests:
      all_of:
        - nitic_horizon: {}

  - code: FR
    name: Ferralsols
    tests:
      all_of:
        - ferralsol: {}                 # v0.3.4: strict gate (ferralic + argic-exclusion with WDC/dpH/SOC paths)

  - code: CH
    name: Chernozems
    tests:
      all_of:
        - chernozem_strict: {}          # v0.3.4: strict gate (chernic + protocalcic/calcic + BS >= 50)

  - code: KS
    name: Kastanozems
    tests:
      all_of:
        - kastanozem_strict: {}         # v0.3.4: strict gate (mollic + protocalcic/calcic <= 70 cm + BS >= 50)

  - code: PH
    name: Phaeozems
    tests:
      all_of:
        - phaeozem: {}

  - code: UM
    name: Umbrisols
    tests:
      all_of:
        - umbric_horizon: {}

  - code: DU
    name: Durisols
    tests:
      all_of:
        - duric_horizon: {}

  - code: GY
    name: Gypsisols
    tests:
      all_of:
        - gypsic: {}

  - code: CL
    name: Calcisols
    tests:
      all_of:
        - calcic: {}

  - code: RT
    name: Retisols
    tests:
      all_of:
        - retic_properties: {}

  - code: AC
    name: Acrisols
    tests:
      all_of:
        - acrisol: {}

  - code: LX
    name: Lixisols
    tests:
      all_of:
        - lixisol: {}

  - code: AL
    name: Alisols
    tests:
      all_of:
        - alisol: {}

  - code: LV
    name: Luvisols
    tests:
      all_of:
        - luvisol: {}

  - code: CM
    name: Cambisols
    tests:
      all_of:
        - cambic: {}

  - code: FL
    name: Fluvisols
    tests:
      all_of:
        - fluvic_material: {}

  - code: AR
    name: Arenosols
    tests:
      all_of:
        - arenic_texture: {}

  - code: RG
    name: Regosols
    tests:
      default: true
    notes: "Catch-all for mineral soils that do not match any prior RSG."

