version: "WRB 2022 (4th edition)"
implementation_status: "soilKey v0.2"
source: |
  IUSS Working Group WRB (2022). World Reference Base for Soil Resources.
  International soil classification system for naming soils and creating
  legends for soil maps. 4th edition. International Union of Soil Sciences,
  Vienna.

# Each RSG is tested in canonical key order. The first whose tests pass
# is assigned. Tests marked `not_implemented_v01:` return NA; the
# engine continues. Default catch-all is RG (Regosols).
#
# v0.2 wires 15 of the 32 RSGs end-to-end:
#   FR, VR, SC, GL, PZ, PT, CH, KS, PH, GY, CL, AC, LX, AL, LV, CM, RG
# (16 explicit + RG default = 17 of 32). The remaining 15 require
# additional horizons (histic, hortic, anthric, cryic, technic,
# leptic, natric, nitic, andic, planic, stagnic, umbric, duric,
# retic, fluvic, arenic) and are scheduled for v0.3.

rsgs:

  - code: HS
    name: Histosols
    tests:
      not_implemented_v01: histic_horizon

  - code: AT
    name: Anthrosols
    tests:
      not_implemented_v01: anthric_horizons

  - code: TC
    name: Technosols
    tests:
      not_implemented_v01: technic_features

  - code: CR
    name: Cryosols
    tests:
      not_implemented_v01: cryic_conditions

  - code: LP
    name: Leptosols
    tests:
      not_implemented_v01: shallow_continuous_rock

  - code: SN
    name: Solonetz
    tests:
      not_implemented_v01: natric_horizon

  - code: VR
    name: Vertisols
    tests:
      all_of:
        - vertic_properties: {}

  - code: SC
    name: Solonchaks
    tests:
      all_of:
        - salic: {}

  - code: GL
    name: Gleysols
    tests:
      all_of:
        - gleyic_properties: {}

  - code: AN
    name: Andosols
    tests:
      not_implemented_v01: andic_properties

  - code: PZ
    name: Podzols
    tests:
      all_of:
        - spodic: {}

  - code: PT
    name: Plinthosols
    tests:
      all_of:
        - plinthic: {}

  - code: NT
    name: Nitisols
    tests:
      not_implemented_v01: nitic_horizon

  - code: FR
    name: Ferralsols
    tests:
      all_of:
        - ferralic: {}
    notes: |
      v0.1: tests the ferralic horizon directly. WRB 2022 Ferralsol
      also requires the ferralic horizon to begin within 150 cm and no
      argic / nitic horizon above; these depth gates are scheduled for
      v0.3 (full key resolution).

  - code: PL
    name: Planosols
    tests:
      not_implemented_v01: planic_features

  - code: ST
    name: Stagnosols
    tests:
      not_implemented_v01: stagnic_properties

  - code: CH
    name: Chernozems
    tests:
      all_of:
        - chernozem: {}

  - code: KS
    name: Kastanozems
    tests:
      all_of:
        - kastanozem: {}

  - code: PH
    name: Phaeozems
    tests:
      all_of:
        - phaeozem: {}

  - code: UM
    name: Umbrisols
    tests:
      not_implemented_v01: umbric_horizon

  - code: DU
    name: Durisols
    tests:
      not_implemented_v01: duric_horizon

  - code: GY
    name: Gypsisols
    tests:
      all_of:
        - gypsic: {}

  - code: CL
    name: Calcisols
    tests:
      all_of:
        - calcic: {}

  - code: RT
    name: Retisols
    tests:
      not_implemented_v01: retic_properties

  - code: AC
    name: Acrisols
    tests:
      all_of:
        - acrisol: {}

  - code: LX
    name: Lixisols
    tests:
      all_of:
        - lixisol: {}

  - code: AL
    name: Alisols
    tests:
      all_of:
        - alisol: {}

  - code: LV
    name: Luvisols
    tests:
      all_of:
        - luvisol: {}

  - code: CM
    name: Cambisols
    tests:
      all_of:
        - cambic: {}

  - code: AR
    name: Arenosols
    tests:
      not_implemented_v01: coarse_texture

  - code: FL
    name: Fluvisols
    tests:
      not_implemented_v01: fluvic_material

  - code: RG
    name: Regosols
    tests:
      default: true
    notes: "Catch-all for mineral soils that do not match any prior RSG."
